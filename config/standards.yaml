# ============================================================
# ASU Course Design Standards - QA Initiate Template
# ============================================================
# Source: [QA + AI] Experience Stage_Review Item Lists.xlsx
# Updated: 2026-04-02 — 173 criteria (124B + 49C), Standard 23 excluded, Standard 24 manual review
# ============================================================
# criterion_id format: B-XX.Y (Col B, id_assistant) or C-XX.Y (Col C, id)
# check_type: "deterministic" | "ai" | "hybrid"
# reviewer_tier: "id_assistant" | "id"
# category: "design_standard" | "crc"
# excluded: true — standard skipped during audits
# ============================================================

standards:
- id: '01'
  name: Course-Level Alignment
  category: Course Structure and Organization
  description: Course-level objectives are measurable and aligned with program objectives, industry relevance, and/or practical applications.
  essential: true
  criteria:
  - criterion_id: B-01.1
    text: 'Experience / Syllabus: Are the course outcomes, course goals, or course objectives present?'
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: B-01.2
    text: 'Experience / Syllabus: Are the learning outcomes or learning objectives present?'
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: B-01.3
    text: Is each course-level objective and/or course outcome written with a measurable action verb?
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: C-01.1
    text: Does each course-level objective and/or course outcome avoid verbs that cannot be defined well enough for effective measurement?
    check_type: ai
    reviewer_tier: id
    category: design_standard
  - criterion_id: C-01.2
    text: Does each course-level objective indicate tasks or knowledge relating to the course focus so learners are truly able to demonstrate mastery of course content?
    check_type: ai
    reviewer_tier: id
    category: design_standard
  - criterion_id: C-01.3
    text: Course-level objectives and/or course outcomes collectively demonstrate how the course supports professional, academic, and/or personal growth.
    check_type: ai
    reviewer_tier: id
    category: design_standard
- id: '02'
  name: Module-Level Alignment
  category: Course Structure and Organization
  description: Module-level objectives are measurable and aligned with course-level outcomes.
  essential: true
  criteria:
  - criterion_id: B-02.1
    text: In each module, are module-level learning outcomes or learning objectives present?
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: B-02.2
    text: Is each module-level objective written with a measurable action verb?
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: C-02.1
    text: Does each module-level learning objective avoid verbs that cannot be defined well enough for effective measurement?
    check_type: ai
    reviewer_tier: id
    category: design_standard
  - criterion_id: C-02.2
    text: Does each module-level learning objective align with at least one course-level objective and/or outcome?
    check_type: ai
    reviewer_tier: id
    category: design_standard
- id: '03'
  name: Alignment Made Clear
  category: Course Structure and Organization
  description: The connection between course- and module-level objectives, learning materials, activities, and assessments is made clear to learners.
  essential: false
  criteria:
  - criterion_id: C-03.1
    text: Are there explanations (visible to learners) of how each learning material prepares learners for their assessments?
    check_type: ai
    reviewer_tier: id
    category: design_standard
  - criterion_id: C-03.2
    text: Are there explanations (visible to learners) of how each learning activity prepares learners for their assessments?
    check_type: ai
    reviewer_tier: id
    category: design_standard
