    reviewer_tier: id_assistant
    category: design_standard
- id: '21'
  name: Technical and Academic Support
  category: Accessibility and Learner Support
  description: The course prominently displays contact information for IT support, accessibility services, and academic resources, as well as language that encourages learners to use them.
  essential: false
  criteria:
  - criterion_id: C-21.1
    text: Does language in the course encourage and normalize learner engagement with support resources?
    check_type: ai
    reviewer_tier: id
    category: design_standard
- id: '22'
  name: Material Accessibility
  category: Accessibility and Learner Support
  description: All course content meets WCAG 2.1 AA standards as supported by FRAME.
  essential: true
  criteria:
  - criterion_id: B-22.1
    text: Do all Canvas pages and page elements meet WCAG 2.1 AA standards and align with POUR (Perceivable, Operable, Understandable, Robust) principles, including proper heading structure, semantic HTML,
      sufficient color contrast, accessible tables, and keyboard navigability?
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: B-22.2
    text: Do all documents (including presentations and handouts) published in the course meet WCAG 2.1 AA standards, ensuring content aligns with POUR principles (e.g., tagged documents, readable text,
      logical reading order, and accessible slide layouts)?
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: B-22.3
    text: Do all images have appropriate alternative (alt) text that conveys the intent and instructional purpose of the image in relation to the surrounding content?
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: C-22.1
    text: Do all complex or information-rich images have detailed descriptions that fully communicate critical content in alignment with the Percievable principle (from POUR)?
    check_type: ai
    reviewer_tier: id
    category: design_standard
  - criterion_id: B-22.4
    text: Are all images that do not convey instructional meaning marked as decorative?
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: B-22.5
    text: Do all hyperlinks use descriptive, meaningful text that clearly communicates the destination or purpose of the link (e.g., "Download the Course Syllabus (PDF)", rather than "Click Here" or "Link")?
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: B-22.6
    text: Does the course offer audio descriptions for all videos with important visual information or provide detailed verbal descriptions of any images or graphics displayed in the video?
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: B-22.7
    text: Do all videos (recorded or live) include accurate, synchronized captions?
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: B-22.8
    text: Does all audio-only content include downloadable transcripts?
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: B-22.9
    text: 'Accessibility: What is the Ally Score for the course?'
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: B-22.10
    text: 'Accessibility: What are the SCOUT results for the course?'
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: B-22.11
    text: 'Accessibility: What is the readability score of the course?'
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
- id: '23'
  name: Tool Accessibility
  category: Accessibility and Learner Support
  description: All third-party tools used in the course meet WCAG 2.1 AA standards.
  essential: true
  criteria:
  - criterion_id: C-23.1
    text: Selected tool(s) are licensed by ASU.
    check_type: ai
    reviewer_tier: id
    category: design_standard
  - criterion_id: C-23.2
    text: Tools were vetted for accessibility compliance, with alternatives provided when necessary.
    check_type: ai
    reviewer_tier: id
    category: design_standard
  excluded: true
  exclusion_reason: All external tools pass ASU accessibility standards before approval. Always Met by policy.
- id: '24'
  name: Mobile and Offline Optimization
