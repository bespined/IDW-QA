    check_type: ai
    reviewer_tier: id
    category: design_standard
- id: '16'
  name: Universally Designed Media
  category: Learning Materials
  description: Materials are provided in varying formats (e.g., text, audio, video) to support global learners.
  essential: false
  criteria:
  - criterion_id: C-16.1
    text: Are learning materials presented in multiple formats (e.g., text, audio, video, etc.) to align with best practices of Universal Design for Learning?
    check_type: ai
    reviewer_tier: id
    category: design_standard
  - criterion_id: B-16.1
    text: Are there at least two different types of course materials formats (e.g., text materials, video materials, audio materials, interactive materials, or other formats)?
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
- id: '17'
  name: Open Space for Learner Questions
  category: Engagement and Interaction
  description: The course includes a prominently featured, actively monitored space where learners can ask questions that support the learning community.
