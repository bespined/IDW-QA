    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: B-04.2
    text: 'Experience / Syllabus: Does the syllabus page have content and/or is the syllabus document present?'
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: B-04.3
    text: 'Experience / Syllabus: Is a course description present?'
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: B-04.4
    text: 'Experience / Syllabus: Is the number of credit hours present?'
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: B-04.5
    text: 'Experience / Syllabus: Is contact information for the instructor (and other course team members, if applicable) present?'
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: B-04.6
    text: 'Experience / Syllabus: Is a description of how to communicate with the instructor (and other course team members, if applicable) present, such as a community forum, chat, email, etc?'
