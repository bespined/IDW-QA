- id: '05'
  name: Engaging Course and Module Introductions
  category: Course Structure and Organization
  description: The introduction to the course and each module sets a welcoming tone, captures attention, highlights its value, and is designed to build an online learning community.
  essential: false
  criteria:
  - criterion_id: C-05.1
    text: The tone of all introductory material is written intentionally, advocates for learner success, and connects to practical or professional applications and learner goals.
    check_type: ai
    reviewer_tier: id
    category: design_standard
  - criterion_id: C-05.2
    text: The course introduction clearly articulates the value proposition of the course and how it connects to learners' academic and professional goals.
    check_type: ai
    reviewer_tier: id
    category: design_standard
  - criterion_id: C-05.3
    text: Each module introduction clearly articulates the value proposition of that module and provides context for how each unit builds upon previous knowledge and contributes to course outcomes.
    check_type: ai
    reviewer_tier: id
    category: design_standard
- id: '06'
  name: Clear Workload Expectations
  category: Course Structure and Organization
  description: The workload and pacing of the course/modules are intentionally aligned with credit-hour expectations and communicated to learners.
  essential: true
  criteria:
  - criterion_id: B-06.1
    text: Are course workload details provided?
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: B-06.2
    text: Are estimated time commitments for course activities clearly communicated?
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: C-06.1
    text: Do course schedules clearly indicate estimated time commitments for course activities?
    check_type: ai
    reviewer_tier: id
    category: design_standard
  - criterion_id: C-06.2
    text: Are estimated time commitments aligned with syllabus credit hour requirements?
    check_type: ai
    reviewer_tier: id
    category: design_standard
  - criterion_id: C-06.3
    text: Does the course have a uniform module structure with straightforward navigation?
    check_type: ai
    reviewer_tier: id
    category: design_standard
  - criterion_id: C-06.4
    text: Is the pacing in the course predictable?
    check_type: ai
    reviewer_tier: id
    category: design_standard
  - criterion_id: C-06.5
    text: Are major assessments distributed throughout the term to avoid workload clusters?
    check_type: ai
    reviewer_tier: id
    category: design_standard
  - criterion_id: B-06.3
    text: Are high-stakes and/or important assessments introduced at the beginning of the course?
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: B-06.4
    text: 'Experience: Do the due dates and availability windows appear to be accurate for the current session?'
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: B-06.5
    text: 'Experience: Does the date information in the course match the date information in the syllabus?'
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
- id: '07'
  name: Instructor Guide
  category: Course Structure and Organization
  description: When appropriate, the course includes setup instructions and notes for future instructors.
  essential: false
  criteria:
  - criterion_id: B-07.1
    text: Does an "Instructor Guide" or equivalent exist?
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: C-07.1
    text: Does an "Instructor Guide" or equivalent exist that includes notes on course setup, technologies, instructional strategies, common learner questions, and assessment expectations?
    check_type: ai
    reviewer_tier: id
    category: design_standard
  - criterion_id: C-07.2
    text: If applicable, does the "Instructor Guide" (or equivalent) document the use of any specialized tools and/or partnerships that are crucial to course delivery, as well as their accompanying resources?
    check_type: ai
    reviewer_tier: id
    category: design_standard
- id: 08
  name: Assessments Align with Objectives
  category: Assessments and Measurement
  description: Assessments measure the aligned course and module objectives.
  essential: true
  criteria:
  - criterion_id: B-08.1
    text: Do assessment directions/descriptions/instructions explicitly state which objectives are being evaluated?
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: C-08.1
    text: Does the evaluation criteria (e.g., rubrics) reinforce objectives being measured?
    check_type: ai
    reviewer_tier: id
    category: design_standard
- id: 09
  name: Clear Grading Criteria
  category: Assessments and Measurement
  description: Detailed rubrics (when appropriate) and assignment instructions are embedded in the LMS, with an estimated feedback timeline included in the course.
  essential: false
  criteria:
  - criterion_id: B-09.1
    text: 'Experience: Do assessment directions/descriptions/instructions clearly explain what is expected of learners in order to complete the assessment?'
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: B-09.2
    text: Do assessment directions/descriptions/instructions and/or rubrics explain how learners earn points on that assessment and/or provide criteria for success?
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: B-09.3
    text: Do the assessment directions/descriptions/instructions specify a method for learners to ask grading questions (e.g., email or office hours)?
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: B-09.4
    text: 'Experience / Syllabus: Is a description of the estimated turnaround time for grading to be completed present?'
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: B-09.5
    text: 'Experience: If applicable, do rubrics agree with what is described in the assessment directions/descriptions/instructions?'
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: B-09.6
    text: 'Experience: Does the course grade breakdown information demonstrated in assessment settings match what is described in the syllabus?'
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: B-09.7
    text: 'Experience: Do assessment settings match the assessment directions/descriptions/instructions provided (e.g., earnable points, time allowed, # of attempts, permitted resources, submission methods)?'
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: B-09.8
    text: If applicable, for quizzes, is the "shuffle answers" setting only used when the question answer options are all order-independent (i.e., answer options are not "T/F" or "Y/N", and answer options
      do not include order-dependent phrasing, e.g., "All of the above," "A and B only," etc.)?
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
- id: '10'
  name: Varied Assessments
  category: Assessments and Measurement
  description: The course includes diverse assessment formats.
  essential: false
  criteria:
  - criterion_id: B-10.1
    text: Does the course includes at least two different types of assessments (e.g., quizzes, projects, discussions, etc.)?
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: C-10.1
    text: Does the course provide multiple ways for learners to demonstrate mastery of objectives?
    check_type: ai
    reviewer_tier: id
    category: design_standard
  - criterion_id: C-10.2
    text: Are assessment types in the course aligned with Universal Design for Learning principles?
    check_type: ai
    reviewer_tier: id
    category: design_standard
  - criterion_id: B-10.2
    text: 'Experience: Does the course include ungraded practice assessments?'
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
- id: '11'
  name: Cognitive Skills Development
  category: Assessments and Measurement
  description: Assessments are structured to guide learners from foundational knowledge to more complex, higher-order learning levels throughout the course.
  essential: false
  criteria:
  - criterion_id: C-11.1
    text: Are the Bloom's Taxonomy levels in module objective verbs appropriate for the course level?
    check_type: ai
    reviewer_tier: id
    category: design_standard
  - criterion_id: C-11.2
    text: Do assessments include a mix of lower- and higher-order Bloom's Taxonomy learning levels?
    check_type: ai
    reviewer_tier: id
    category: design_standard
- id: '12'
  name: Materials Align with Objectives
  category: Learning Materials
  description: Course materials support learners in achieving the aligned course and module objectives.
  essential: true
  criteria:
  - criterion_id: C-12.1
    text: Does each material support the achievement of at least one learning objective?
    check_type: ai
    reviewer_tier: id
    category: design_standard
- id: '13'
  name: High-Quality Content
  category: Learning Materials
  description: Instructional materials apply discipline-specific and industry-accepted best practices for the course's content.
  essential: false
  criteria:
  - criterion_id: C-13.1
    text: Are all written, visual, and multimedia content of best quality available and align with professional standards for the discipline and/or institution?
    check_type: ai
    reviewer_tier: id
    category: design_standard
  - criterion_id: B-13.1
    text: If applicable, are all media elements appropriately cited?
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: C-13.2
    text: Does each outside material have proper citation and necessary publisher permissions (if applicable)?
    check_type: ai
    reviewer_tier: id
    category: design_standard
  - criterion_id: B-13.2
    text: 'Functionality: Do all videos in the course appear and play in Student view?'
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: B-13.3
    text: 'Functionality: Do all URLs/links work?'
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: B-13.4
    text: 'Functionality: Do all documents linked or embedded on pages appear in Student view?'
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: B-13.5
    text: 'Functionality: Do all media elements (e.g., images) display correctly in Student view?'
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: B-13.6
    text: 'Functionality: Are all media elements (e.g., images) sized appropriately (e.g., not extremely small or excessively large) in Student view?'
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: B-13.7
    text: 'Experience: Do all videos have 720p resolution or higher?'
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: B-13.8
    text: 'Experience: Are course documents provided to learners directly in the course (e.g., no Google Drive links)?'
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: B-13.9
    text: 'Experience: Do all outgoing links open in a new window?'
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: B-13.10
    text: 'Experience: Is text free of typos?'
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: B-13.11
    text: 'Experience: Is text grammatically accurate?'
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: B-13.12
    text: 'Experience: Is text free of placeholders?'
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: B-13.13
    text: 'Experience: Is text formatted consistently?'
    check_type: deterministic
    reviewer_tier: id_assistant
    category: design_standard
  - criterion_id: B-13.14
    text: 'Experience: Does text avoid being too dense (e.g., paragraphs aren''t too long, ordered and unordered lists used appropriately, etc.)?'
